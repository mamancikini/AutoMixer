name: Cetak APK AutoMixer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Data Repo Lu
        uses: actions/checkout@v4

      - name: Nyalain Mesin Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Nyalain Mesin Java Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Rakit Folder & Install Capacitor
        run: |
          mkdir -p www
          cp index.html www/
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android

      - name: Cetak APK (Proses Berat)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Kirim Hasil APK ke Lu
        uses: actions/upload-artifact@v4
        with:
          name: AutoMixer-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

